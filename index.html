<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Miau – Deine Traumkatze</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:    #ff85b3;
    --pink2:   #ffb3d1;
    --yellow:  #ffe066;
    --orange:  #ffb347;
    --blue:    #85d4ff;
    --blue2:   #c0eaff;
    --green:   #a8e6a3;
    --purple:  #c9a0ff;
    --white:   #fff9fc;
    --dark:    #3a2545;
    --shadow:  rgba(58,37,69,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ffe0f0 0%, #e0f4ff 50%, #fff0d0 100%);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    position: relative;
  }

  /* ───── ROOMS ───── */
  .room {
    display: none;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8px;
  }
  .room.active { display: flex; }

  /* Kitchen */
  #room-kitchen {
    background: linear-gradient(180deg,#fff9e0 0%,#ffe9b0 60%,#ffd080 100%);
  }
  /* Bathroom */
  #room-bath {
    background: linear-gradient(180deg,#e0f7ff 0%,#b5e9ff 60%,#7dd6f5 100%);
  }
  /* Wardrobe */
  #room-wardrobe {
    background: linear-gradient(180deg,#f9e0ff 0%,#e9c8ff 60%,#d4a8ff 100%);
  }
  /* Playroom */
  #room-play {
    background: linear-gradient(180deg,#e0ffe8 0%,#b5ffcc 60%,#7df5a8 100%);
  }

  /* ───── ROOM DECOR ───── */
  .room-decor {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 40%;
    pointer-events: none;
  }

  /* floor */
  .floor {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 90px;
    border-radius: 60% 60% 0 0 / 20px 20px 0 0;
  }
  #room-kitchen .floor   { background: #f7c97e; }
  #room-bath .floor      { background: #7dd6f5; }
  #room-wardrobe .floor  { background: #c9a0ff; }
  #room-play .floor      { background: #7df5a8; }

  /* wall tiles in bath */
  .tile {
    position: absolute;
    background: rgba(255,255,255,0.35);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 4px;
  }

  /* ───── NAV BAR ───── */
  #navbar {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    padding: 8px 4px 12px;
    border-top: 3px solid var(--pink2);
    z-index: 100;
    gap: 4px;
  }

  .nav-btn {
    flex: 1;
    max-width: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--dark);
    transition: transform .15s;
    padding: 4px 2px;
    border-radius: 14px;
    gap: 2px;
  }
  .nav-btn:active { transform: scale(0.88); }
  .nav-btn.active {
    background: var(--pink2);
    color: var(--dark);
  }
  .nav-btn .icon { font-size: 26px; line-height: 1; }

  /* ───── NEEDS BAR ───── */
  #needs-bar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 3px solid var(--pink2);
    padding: 6px 10px 4px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .needs-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .need-item {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .need-icon { font-size: 16px; }
  .need-bar-wrap {
    flex: 1;
    height: 10px;
    background: rgba(0,0,0,0.08);
    border-radius: 8px;
    overflow: hidden;
  }
  .need-bar-fill {
    height: 100%;
    border-radius: 8px;
    transition: width .6s ease, background .4s;
  }
  #bar-hunger  .need-bar-fill { background: var(--orange); }
  #bar-clean   .need-bar-fill { background: var(--blue); }
  #bar-love    .need-bar-fill { background: var(--pink); }
  #bar-play    .need-bar-fill { background: var(--green); }
  #mood-label {
    font-family: 'Fredoka One', cursive;
    font-size: 13px;
    color: var(--dark);
    text-align: center;
    padding: 1px 0;
  }

  /* ───── CAT ───── */
  #cat-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 10px;
    cursor: pointer;
    z-index: 10;
  }

  #cat-svg {
    width: 140px;
    height: 140px;
    filter: drop-shadow(0 8px 18px var(--shadow));
    transition: transform .2s;
    animation: float 3s ease-in-out infinite;
  }
  #cat-svg:active { transform: scale(0.92); }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .cat-bounce { animation: catBounce .35s ease !important; }
  @keyframes catBounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18) rotate(-5deg); }
    70%  { transform: scale(0.93) rotate(3deg); }
    100% { transform: scale(1); }
  }

  #cat-emotion {
    font-size: 32px;
    margin-top: -8px;
    animation: emotionPop .4s ease;
  }
  @keyframes emotionPop {
    0%   { transform: scale(0); opacity:0; }
    60%  { transform: scale(1.3); }
    100% { transform: scale(1); opacity:1; }
  }

  /* purr ring */
  .purr-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 3px solid var(--pink);
    transform: translate(-50%,-50%) scale(1);
    opacity: 0;
    pointer-events: none;
  }
  .purr-ring.active {
    animation: purrPulse 1.2s ease-in-out infinite;
  }
  @keyframes purrPulse {
    0%   { transform: translate(-50%,-50%) scale(0.9); opacity:.7; }
    50%  { transform: translate(-50%,-50%) scale(1.5); opacity:.2; }
    100% { transform: translate(-50%,-50%) scale(0.9); opacity:.7; }
  }

  /* ───── SPEECH BUBBLE ───── */
  #speech-bubble {
    background: white;
    border: 3px solid var(--pink);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    color: var(--dark);
    position: relative;
    margin-top: 6px;
    max-width: 220px;
    text-align: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity .25s, transform .25s;
    pointer-events: none;
  }
  #speech-bubble.show {
    opacity: 1;
    transform: scale(1);
  }
  #speech-bubble::before {
    content:'';
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-bottom-color: var(--pink);
  }
  #speech-bubble::after {
    content:'';
    position: absolute;
    top: -9px; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: white;
  }

  /* ───── KITCHEN ───── */
  #food-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    padding: 0 16px;
    width: 100%;
    max-width: 360px;
    margin-top: 8px;
  }
  .food-btn {
    background: white;
    border: 3px solid var(--orange);
    border-radius: 18px;
    padding: 10px 6px;
    font-size: 26px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 12px var(--shadow);
    display: flex; flex-direction: column;
    align-items: center;
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    gap: 2px;
  }
  .food-btn span { font-size: 10px; font-weight: 700; color: var(--dark); }
  .food-btn:active { transform: scale(0.9); box-shadow: none; }

  /* ───── BATH ───── */
  #bath-area {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    margin-top: 8px;
  }

  #bathtub-svg {
    width: 210px;
    cursor: pointer;
    filter: drop-shadow(0 6px 14px rgba(0,100,180,0.18));
  }

  .bath-btn-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .bath-btn {
    background: white;
    border: 3px solid var(--blue);
    border-radius: 16px;
    padding: 10px 16px;
    font-size: 22px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    transition: transform .15s;
    box-shadow: 0 4px 10px var(--shadow);
  }
  .bath-btn:active { transform: scale(0.88); }

  /* ───── WARDROBE ───── */
  #wardrobe-area {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    margin-top: 8px;
  }
  #outfit-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    width: 100%;
  }
  .outfit-btn {
    background: white;
    border: 3px solid var(--purple);
    border-radius: 16px;
    padding: 10px 4px;
    font-size: 28px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, background .2s;
    box-shadow: 0 4px 10px var(--shadow);
  }
  .outfit-btn:active { transform: scale(0.88); }
  .outfit-btn.selected { background: var(--purple); }
  .outfit-btn span { font-size: 10px; font-weight: 700; color: var(--dark); display:block; }
  #pet-btn {
    background: linear-gradient(135deg,var(--pink),var(--purple));
    border: none;
    border-radius: 20px;
    padding: 12px 28px;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 14px var(--shadow);
    transition: transform .15s;
  }
  #pet-btn:active { transform: scale(0.9); }

  /* ───── PLAY ROOM ───── */
  #play-canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 400px;
    height: 220px;
    overflow: hidden;
    border-radius: 24px;
    border: 3px solid var(--green);
    background: rgba(255,255,255,0.35);
    margin-top: 8px;
    cursor: crosshair;
    box-shadow: 0 6px 20px var(--shadow);
  }
  #play-canvas { width: 100%; height: 100%; position: relative; }

  .ball {
    position: absolute;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    pointer-events: none;
    transition: left .05s, top .05s;
  }

  #cat-play-target {
    position: absolute;
    bottom: 10px;
    font-size: 50px;
    transition: left .25s ease-out;
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.15));
  }

  .ball-grid {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center;
    padding: 0 12px;
    margin-top: 6px;
    max-width: 400px;
  }
  .ball-pick-btn {
    background: white;
    border: 3px solid var(--green);
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px var(--shadow);
    transition: transform .15s, border-color .15s;
  }
  .ball-pick-btn.selected { border-color: var(--dark); transform: scale(1.15); }
  .ball-pick-btn:active   { transform: scale(0.88); }

  #throw-btn {
    background: linear-gradient(135deg,var(--green),var(--blue));
    border: none;
    border-radius: 20px;
    padding: 12px 32px;
    color: var(--dark);
    font-family: 'Fredoka One', cursive;
    font-size: 17px;
    cursor: pointer;
    box-shadow: 0 4px 14px var(--shadow);
    transition: transform .15s;
    margin-top: 4px;
  }
  #throw-btn:active { transform: scale(0.9); }

  /* ───── CATCH ANIMATION ───── */
  .catch-burst {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    animation: burst .7s ease forwards;
    z-index: 50;
  }
  @keyframes burst {
    0%   { transform: scale(0) rotate(0deg); opacity:1; }
    60%  { transform: scale(1.5) rotate(20deg); opacity:.8; }
    100% { transform: scale(0) rotate(40deg); opacity:0; }
  }

  /* ───── TOAST / FLOATING SCORE ───── */
  .floating-txt {
    position: fixed;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--dark);
    text-shadow: 0 2px 6px white;
    pointer-events: none;
    animation: floatUp 1.1s ease forwards;
    z-index: 200;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity:1; }
    100% { transform: translateY(-70px) scale(1.2); opacity:0; }
  }

  /* ───── WATER DROPS ───── */
  .water-drop {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: dropFall .9s ease forwards;
  }
  @keyframes dropFall {
    0%   { transform: translateY(-20px); opacity:1; }
    100% { transform: translateY(60px); opacity:0; }
  }

  /* ───── SCROLL TITLE ───── */
  .room-title {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: var(--dark);
    margin-top: 4px;
    letter-spacing: 1px;
    text-shadow: 0 2px 0 rgba(255,255,255,.7);
  }

  /* ───── CAT OUTFIT BADGE ───── */
  #outfit-badge {
    position: absolute;
    top: -8px; right: -8px;
    font-size: 22px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.2));
  }

  /* ───── STARS ───── */
  .star {
    position: fixed;
    pointer-events: none;
    animation: starAnim .9s ease forwards;
    font-size: 20px;
    z-index: 200;
  }
  @keyframes starAnim {
    0%   { transform: scale(0) rotate(0deg); opacity:1; }
    50%  { transform: scale(1.4) rotate(30deg); opacity:1; }
    100% { transform: scale(0) rotate(60deg) translateY(-40px); opacity:0; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- NEEDS BAR -->
  <div id="needs-bar">
    <div class="needs-row">
      <div class="need-item" id="bar-hunger">
        <span class="need-icon">🍣</span>
        <div class="need-bar-wrap"><div class="need-bar-fill" id="fill-hunger" style="width:80%"></div></div>
      </div>
      <div class="need-item" id="bar-clean">
        <span class="need-icon">🛁</span>
        <div class="need-bar-wrap"><div class="need-bar-fill" id="fill-clean" style="width:70%"></div></div>
      </div>
      <div class="need-item" id="bar-love">
        <span class="need-icon">💕</span>
        <div class="need-bar-wrap"><div class="need-bar-fill" id="fill-love" style="width:65%"></div></div>
      </div>
      <div class="need-item" id="bar-play">
        <span class="need-icon">⚽</span>
        <div class="need-bar-wrap"><div class="need-bar-fill" id="fill-play" style="width:60%"></div></div>
      </div>
    </div>
    <div id="mood-label">😊 Miau fühlt sich gut!</div>
  </div>

  <!-- ═══════════ KITCHEN ═══════════ -->
  <div class="room active" id="room-kitchen">
    <div class="floor"></div>
    <div style="height:70px"></div>
    <div class="room-title">🍽️ Küche</div>

    <div id="cat-wrap" onclick="petCat()">
      <div class="purr-ring" id="purr-ring"></div>
      <svg id="cat-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- body -->
        <ellipse cx="100" cy="130" rx="55" ry="48" fill="#f9a875"/>
        <!-- head -->
        <circle cx="100" cy="78" r="46" fill="#f9a875"/>
        <!-- ears -->
        <polygon points="64,40 52,10 82,35" fill="#f9a875"/>
        <polygon points="136,40 148,10 118,35" fill="#f9a875"/>
        <polygon points="67,38 57,18 80,35" fill="#ffcba4"/>
        <polygon points="133,38 143,18 120,35" fill="#ffcba4"/>
        <!-- face -->
        <circle cx="84" cy="76" r="9" fill="white"/>
        <circle cx="116" cy="76" r="9" fill="white"/>
        <circle id="eye-l" cx="86" cy="77" r="5.5" fill="#3a2545"/>
        <circle id="eye-r" cx="118" cy="77" r="5.5" fill="#3a2545"/>
        <circle cx="88" cy="75" r="2" fill="white"/>
        <circle cx="120" cy="75" r="2" fill="white"/>
        <!-- nose -->
        <ellipse cx="100" cy="90" rx="5" ry="4" fill="#ff7eb3"/>
        <!-- mouth -->
        <path id="cat-mouth" d="M96 94 Q100 99 104 94" stroke="#3a2545" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- whiskers -->
        <line x1="55" y1="88" x2="88" y2="91" stroke="#3a2545" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="55" y1="93" x2="88" y2="93" stroke="#3a2545" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="55" y1="98" x2="88" y2="94" stroke="#3a2545" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="145" y1="88" x2="112" y2="91" stroke="#3a2545" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="145" y1="93" x2="112" y2="93" stroke="#3a2545" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="145" y1="98" x2="112" y2="94" stroke="#3a2545" stroke-width="1.5" stroke-linecap="round"/>
        <!-- paws -->
        <ellipse cx="72" cy="168" rx="18" ry="12" fill="#f9a875"/>
        <ellipse cx="128" cy="168" rx="18" ry="12" fill="#f9a875"/>
        <!-- tail -->
        <path d="M155 155 Q185 130 178 108 Q172 88 160 95" stroke="#f9a875" stroke-width="14" fill="none" stroke-linecap="round"/>
        <!-- outfit layer -->
        <g id="outfit-layer" opacity="0"></g>
        <!-- blush -->
        <ellipse id="blush-l" cx="74" cy="87" rx="10" ry="6" fill="#ffb3c6" opacity="0"/>
        <ellipse id="blush-r" cx="126" cy="87" rx="10" ry="6" fill="#ffb3c6" opacity="0"/>
      </svg>
      <div id="cat-emotion">😺</div>
      <div id="outfit-badge"></div>
    </div>

    <div id="speech-bubble">Ich hab Hunger! 🍣</div>

    <div id="food-grid">
      <button class="food-btn" onclick="feed('🐟','Fisch',20)">🐟<span>Fisch</span></button>
      <button class="food-btn" onclick="feed('🍣','Sushi',25)">🍣<span>Sushi</span></button>
      <button class="food-btn" onclick="feed('🥛','Milch',15)">🥛<span>Milch</span></button>
      <button class="food-btn" onclick="feed('🍗','Hühnchen',22)">🍗<span>Hähnchen</span></button>
      <button class="food-btn" onclick="feed('🍪','Leckerli',10)">🍪<span>Leckerli</span></button>
      <button class="food-btn" onclick="feed('🥩','Thunfisch',18)">🥩<span>Thunfisch</span></button>
    </div>
  </div>

  <!-- ═══════════ BATHROOM ═══════════ -->
  <div class="room" id="room-bath">
    <!-- decorative tiles -->
    <div class="tile" style="width:40px;height:40px;top:80px;left:20px"></div>
    <div class="tile" style="width:40px;height:40px;top:80px;left:68px"></div>
    <div class="tile" style="width:40px;height:40px;top:80px;left:116px"></div>
    <div class="tile" style="width:40px;height:40px;top:128px;left:44px"></div>
    <div class="tile" style="width:40px;height:40px;top:128px;left:92px"></div>
    <div class="floor"></div>

    <div style="height:70px"></div>
    <div class="room-title">🛁 Badezimmer</div>

    <div id="cat-wrap-bath" style="position:relative;display:flex;flex-direction:column;align-items:center;">
      <svg width="130" height="130" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" id="cat-bath-svg" style="cursor:pointer;filter:drop-shadow(0 6px 16px rgba(0,100,180,.2))" onclick="bathCat()">
        <ellipse cx="100" cy="130" rx="55" ry="48" fill="#f9a875"/>
        <circle cx="100" cy="78" r="46" fill="#f9a875"/>
        <polygon points="64,40 52,10 82,35" fill="#f9a875"/>
        <polygon points="136,40 148,10 118,35" fill="#f9a875"/>
        <polygon points="67,38 57,18 80,35" fill="#ffcba4"/>
        <polygon points="133,38 143,18 120,35" fill="#ffcba4"/>
        <circle cx="84" cy="76" r="9" fill="white"/>
        <circle cx="116" cy="76" r="9" fill="white"/>
        <circle cx="86" cy="77" r="5.5" fill="#3a2545"/>
        <circle cx="118" cy="77" r="5.5" fill="#3a2545"/>

<script>
// ═══════════════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API – no external files)
// ═══════════════════════════════════════════════════
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, vol, delay=0) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.05);
  } catch(e) {}
}
function playChime(notes, type='triangle', dur=0.18, vol=0.25) {
  notes.forEach((f,i) => playTone(f, type, dur, vol, i*0.12));
}
function playPurr() {
  try {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ctx.sampleRate;
      const lfo = Math.sin(2*Math.PI*25*t);
      data[i] = lfo * Math.sin(2*Math.PI*180*t) * 0.08 * (1-t/2);
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
  } catch(e) {}
}
function playSplash() {
  try {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random()*2-1) * Math.exp(-i / (ctx.sampleRate * 0.08)) * 0.4;
    }
    const src = ctx.createBufferSource();
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 2;
    src.connect(filt); filt.connect(ctx.destination);
    src.start();
  } catch(e) {}
}
function playBounce() {
  playTone(600, 'sine', 0.12, 0.3);
  setTimeout(() => playTone(900, 'sine', 0.08, 0.2), 80);
}
function playCatch() {
  playChime([523,659,784,1047], 'triangle', 0.15, 0.3);
}
function playEat() {
  playChime([440,550,660], 'sine', 0.1, 0.25);
}
function playPet() {
  playChime([523,659,784], 'triangle', 0.12, 0.2);
}
function playOutfit() {
  playChime([659,784,988,1047], 'triangle', 0.14, 0.25);
}
function playMeow() {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(500, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.15);
    osc.frequency.linearRampToValueAtTime(450, ctx.currentTime + 0.4);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}
function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}

// ═══════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════
const state = {
  hunger:  80,
  clean:   70,
  love:    65,
  playful: 60,
  outfit:  -1,
  happy:   true
};

const outfits = [
  {name:'Schleife', emoji:'🎀'},
  {name:'Hut',      emoji:'👒'},
  {name:'Schal',    emoji:'🧣'},
  {name:'Weste',    emoji:'🦺'},
  {name:'Sternchen',emoji:'🌟'},
  {name:'Zylinder', emoji:'🎩'},
];

let purrActive = false;
let speechTimer = null;
let selectedBall = 0;
const balls = ['⚽','🎾','🏀','🔮','🍎'];

// ═══════════════════════════════════════════════════
//  NEEDS DECAY (every 8s)
// ═══════════════════════════════════════════════════
setInterval(() => {
  state.hunger  = Math.max(0, state.hunger  - 1.5);
  state.clean   = Math.max(0, state.clean   - 1.0);
  state.love    = Math.max(0, state.love    - 1.2);
  state.playful = Math.max(0, state.playful - 1.3);
  updateUI();
}, 8000);

// ═══════════════════════════════════════════════════
//  UI UPDATE
// ═══════════════════════════════════════════════════
function updateUI() {
  document.getElementById('fill-hunger').style.width  = state.hunger  + '%';
  document.getElementById('fill-clean').style.width   = state.clean   + '%';
  document.getElementById('fill-love').style.width    = state.love    + '%';
  document.getElementById('fill-play').style.width    = state.playful + '%';

  const avg = (state.hunger + state.clean + state.love + state.playful) / 4;

  // mood label + emotion
  let emotion, mood;
  if (avg > 80) {
    emotion = '😻'; mood = 'Miau ist überglücklich! 💕';
    if (!purrActive) startPurr();
  } else if (avg > 60) {
    emotion = '😸'; mood = 'Miau fühlt sich toll!';
    if (!purrActive) startPurr();
  } else if (avg > 40) {
    emotion = '😺'; mood = 'Miau ist zufrieden.';
    stopPurr();
  } else if (avg > 25) {
    emotion = '😿'; mood = 'Miau braucht Aufmerksamkeit...';
    stopPurr();
  } else {
    emotion = '😾'; mood = 'Miau ist sehr traurig! 😢';
    stopPurr();
  }
  document.getElementById('mood-label').textContent = mood;
  document.getElementById('cat-emotion').textContent = emotion;
  document.getElementById('bath-emotion').textContent = emotion;
  document.getElementById('wardrobe-emotion').textContent = emotion;
}

function startPurr() {
  if (purrActive) return;
  purrActive = true;
  document.getElementById('purr-ring').classList.add('active');
  playPurr();
}
function stopPurr() {
  purrActive = false;
  document.getElementById('purr-ring').classList.remove('active');
}

// ═══════════════════════════════════════════════════
//  SPEECH BUBBLE
// ═══════════════════════════════════════════════════
const catSayings = [
  'Miau! 💕','Schnurrr... 😻','Ich liebe dich!','Du bist die Beste!',
  'Noch mehr Leckerlis?','Spielen? Spielen! ⚽','Knuddel mich!',
  'Purrrr~','Das war lecker!','Ich bin so glücklich!'
];
function showSpeech(text) {
  const el = document.getElementById('speech-bubble');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════
//  ROOM NAVIGATION
// ═══════════════════════════════════════════════════
function goRoom(name) {
  document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('room-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  playTone(440, 'triangle', 0.1, 0.18);
  vibrate(30);
}

// ═══════════════════════════════════════════════════
//  FLOATING TEXT
// ═══════════════════════════════════════════════════
function spawnFloat(text, x, y, color='var(--dark)') {
  const el = document.createElement('div');
  el.className = 'floating-txt';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.color = color;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}
function spawnStars(x, y, count=5) {
  const emojis = ['⭐','✨','💫','🌟'];
  for (let i=0; i<count; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = (x + (Math.random()-0.5)*80) + 'px';
    el.style.top  = (y + (Math.random()-0.5)*60) + 'px';
    el.style.animationDelay = (Math.random()*0.3) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// ═══════════════════════════════════════════════════
//  KITCHEN – FEED
// ═══════════════════════════════════════════════════
function feed(emoji, name, amount) {
  state.hunger = Math.min(100, state.hunger + amount);
  state.love   = Math.min(100, state.love   + 3);
  playEat();
  vibrate([20,10,20]);
  const btn = event.currentTarget;
  const r = btn.getBoundingClientRect();
  spawnFloat('+' + amount + ' 🍽️', r.left + 20, r.top - 10, '#ff9500');
  spawnStars(r.left + 26, r.top, 4);
  bounceCat();
  showSpeech('Mmm... ' + emoji + ' ist super lecker!');
  updateUI();
}

//  PET CAT (kitchen)
// ═══════════════════════════════════════════════════
function petCat() {
  state.love = Math.min(100, state.love + 8);
  playPet(); playMeow(); playPurr();
  vibrate([15,5,15,5,15]);
  bounceCat();
  const r = document.getElementById('cat-svg').getBoundingClientRect();

    const el = document.getElementById(id);
    el.setAttribute('opacity','0.6');
    setTimeout(()=>el.setAttribute('opacity','0'),1500);
  });
  updateUI();
}

function bounceCat() {
  const cat = document.getElementById('cat-svg');
  cat.classList.add('cat-bounce');
  setTimeout(() => cat.classList.remove('cat-bounce'), 400);
}

// ═══════════════════════════════════════════════════
//  BATHROOM
// ═══════════════════════════════════════════════════
function washCat() {
  state.clean = Math.min(100, state.clean + 25);
  state.love  = Math.min(100, state.love  + 4);
  playSplash();
  vibrate([30,10,30]);
  document.getElementById('bath-emotion').textContent = '😸';
  spawnWaterDrops();
  const r = document.getElementById('cat-bath-svg').getBoundingClientRect();
  spawnFloat('✨ Sauber!', r.left + 20, r.top - 10, 'var(--blue)');
  spawnStars(r.left + r.width/2, r.top + 20, 4);
  showBathFoam();
  updateUI();
}
function bubblebath() {
  state.clean = Math.min(100, state.clean + 35);
  state.love  = Math.min(100, state.love  + 6);
  state.playful = Math.min(100, state.playful + 5);
  playSplash();
  setTimeout(playSplash, 200);
  vibrate([20,10,20,10,40]);
  spawnWaterDrops(12, '🫧');
  const r = document.getElementById('bathtub-svg').getBoundingClientRect();
  spawnFloat('🫧 Schaumbad!', r.left + 50, r.top - 10, 'var(--blue)');
  spawnStars(r.left + r.width/2, r.top, 6);
  showBathFoam();
  updateUI();
}
function dryCat() {
  state.love = Math.min(100, state.love + 5);
  playChime([440,550,660,770], 'sine', 0.1, 0.2);
  vibrate([10,5,10,5,10]);
  const r = document.getElementById('cat-bath-svg').getBoundingClientRect();
  spawnFloat('💨 Trocken!', r.left + 10, r.top - 10, '#888');
  for (let i=0; i<5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.style.cssText = `position:fixed;font-size:18px;pointer-events:none;
        left:${r.left + 20 + Math.random()*80}px;top:${r.top + Math.random()*40}px;
        animation:floatUp 0.8s ease forwards;z-index:200`;
      el.textContent = '💨';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }, i*100);
  }
  updateUI();
}
function showBathFoam() {
  ['foam1','foam2','foam3'].forEach((id,i) => {
    const el = document.getElementById(id);
    setTimeout(() => {
      el.setAttribute('opacity','1');
      setTimeout(() => el.setAttribute('opacity','0'), 1200);
    }, i*150);
  });
}
function spawnWaterDrops(count=8, emoji='💧') {
  const wrap = document.getElementById('room-bath');
  const r = wrap.getBoundingClientRect();
  for (let i=0; i<count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'water-drop';
      el.textContent = emoji;
      el.style.left = (Math.random() * (r.width - 40)) + 'px';
      el.style.top  = (80 + Math.random() * 100) + 'px';
      el.style.position = 'absolute';
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }, i * 80);
  }
}

function wearOutfit(idx) {
  state.outfit = idx;
  state.love = Math.min(100, state.love + 6);
  playOutfit();
  vibrate([20,10,20,10,20]);
  document.querySelectorAll('.outfit-btn').forEach((b,i) => {
    b.classList.toggle('selected', i===idx);
  });
  const o = outfits[idx];
  document.getElementById('outfit-label').textContent = o.emoji + ' ' + o.name;
  document.getElementById('outfit-badge').textContent = o.emoji;

  // draw outfit on wardrobe cat SVG
  const layer = document.getElementById('outfit-wardrobe-layer');
  if (layer) layer.innerHTML = outfitSVGs[idx];

  // also draw on kitchen cat
  const kitLayer = document.getElementById('outfit-layer');
  if (kitLayer) {
    kitLayer.innerHTML = outfitSVGs[idx];
    kitLayer.setAttribute('opacity','1');
  }

  const r = document.getElementById('outfit-label').getBoundingClientRect();
  spawnFloat(o.emoji + ' So schön!', r.left, r.top - 20, 'var(--purple)');
  spawnStars(r.left + 60, r.top, 5);
  document.getElementById('wardrobe-emotion').textContent = '😻';
  updateUI();
}
function petWardrobe() {
  state.love = Math.min(100, state.love + 10);
  playPet(); playMeow(); playPurr();
  vibrate([15,5,15,5,15,5,15]);
  const r = document.getElementById('cat-wrap-wardrobe').getBoundingClientRect();
  spawnStars(r.left + r.width/2, r.top + 30, 7);
  spawnFloat('💕 +10', r.left + 20, r.top - 10, 'var(--pink)');
  document.getElementById('wardrobe-emotion').textContent = '😻';
  updateUI();
}

// ═══════════════════════════════════════════════════
//  PLAY ROOM
// ═══════════════════════════════════════════════════
let catPlayPos = 50;   // % of canvas width
let ballInFlight = false;
let catChasing = false;

function selectBall(idx, btn) {
  selectedBall = idx;
  document.querySelectorAll('.ball-pick-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  playTone(440 + idx*60, 'triangle', 0.1, 0.2);
  vibrate(20);
}

function throwBallCenter() {
  const wrap = document.getElementById('play-canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const x = r.left + Math.random() * r.width;
  const y = r.top + r.height * 0.3;
  doThrow(x, y, r);
}
function throwBall(evt) {
  const wrap = document.getElementById('play-canvas-wrap');
  const r = wrap.getBoundingClientRect();
  doThrow(evt.clientX, evt.clientY, r);
}

function doThrow(clientX, clientY, canvasRect) {
  if (ballInFlight) return;
  ballInFlight = true;
  playBounce();
  vibrate([15,10,15]);

  const canvas = document.getElementById('play-canvas');
  const localX = clientX - canvasRect.left;
  const localY = clientY - canvasRect.top;

  // create ball
  const ball = document.createElement('div');
  ball.className = 'ball';
  ball.textContent = balls[selectedBall];
  ball.style.left = localX + 'px';
  ball.style.top  = '10px';
  canvas.appendChild(ball);

  // animate ball falling towards localX
  let t = 0;
  const startY = 10;
  const endY   = canvasRect.height - 55;
  const startX = localX;
  const spin   = (Math.random()-0.5) * 60;

  const anim = setInterval(() => {
    t += 0.04;
    const y = startY + (endY - startY) * t;
    const x = startX + spin * t;
    ball.style.top  = y + 'px';
    ball.style.left = x + 'px';
    ball.style.transform = `rotate(${t*360}deg)`;

    if (t >= 1) {
      clearInterval(anim);
      // cat chases
      const targetPct = Math.max(5, Math.min(85, (x / canvasRect.width) * 100));
      moveCatTo(targetPct, x, canvasRect, ball);
    }
  }, 20);
}

function moveCatTo(pct, ballX, canvasRect, ballEl) {
  const catEl = document.getElementById('cat-play-target');
  catEl.style.left = pct + '%';
  catChasing = true;

  // after cat reaches, catch the ball
  setTimeout(() => {
    catEl.textContent = '😸';
    playCatch();
    vibrate([10,5,10,5,30]);
    state.playful = Math.min(100, state.playful + 15);
    state.love    = Math.min(100, state.love    + 4);

    // burst effect
    const burst = document.createElement('div');
    burst.className = 'catch-burst';
    burst.textContent = '✨';
    burst.style.left = pct + '%';
    burst.style.bottom = '55px';
    document.getElementById('play-canvas').appendChild(burst);
    setTimeout(() => burst.remove(), 800);

    const r = catEl.getBoundingClientRect();
    spawnFloat('Gefangen! 🎉', r.left, r.top - 20, 'var(--green)');
    spawnStars(r.left + 25, r.top, 5);

    // remove ball
    if (ballEl) ballEl.remove();
    setTimeout(() => {
      catEl.textContent = '🐱';
      catChasing = false;
      ballInFlight = false;
    }, 900);
    updateUI();
  }, 500);
}

// ═══════════════════════════════════════════════════
//  HAPTIC on EVERY tap (body)
// ═══════════════════════════════════════════════════
document.addEventListener('touchstart', () => {
  vibrate(8);
}, {passive:true});

// ═══════════════════════════════════════════════════
//  INITIAL SPEECH PROMPTS per room
// ═══════════════════════════════════════════════════
const roomSpeeches = {
  kitchen:  'Ich hab Hunger! Füttere mich bitte! 🍣',
  bath:     'Ich bin ein bisschen schmutzig... 🛁',
  wardrobe: 'Zieh mir etwas Schönes an! 👗',
  play:     'Spielen spielen spielen! ⚽',
};

const origGoRoom = goRoom;
window.goRoom = function(name) {
  origGoRoom(name);
  setTimeout(() => showSpeech(roomSpeeches[name]), 400);
};

// ═══════════════════════════════════════════════════
//  RANDOM MEOW every 30-60s
// ═══════════════════════════════════════════════════
function scheduleRandomMeow() {
  const delay = 30000 + Math.random() * 30000;
  setTimeout(() => {
    const avg = (state.hunger + state.clean + state.love + state.playful) / 4;
    if (avg > 60) {
      playMeow();
      showSpeech(catSayings[Math.floor(Math.random()*catSayings.length)]);
    } else {
      const needs = [];
      if (state.hunger  < 40) needs.push('Ich hab Hunger! 🍣');
      if (state.clean   < 40) needs.push('Ich will gebadet werden! 🛁');
      if (state.love    < 40) needs.push('Kraul mich bitte! 💕');
      if (state.playful < 40) needs.push('Ich will spielen! ⚽');
      if (needs.length) {
        playMeow();
        showSpeech(needs[Math.floor(Math.random()*needs.length)]);
      }
    }
    scheduleRandomMeow();
  }, delay);
}
scheduleRandomMeow();
